model = "gpt-5.6-sol"
model_reasoning_effort = "low"
model_reasoning_summary = "concise"
model_verbosity = "medium"
plan_mode_reasoning_effort = "high"
approval_policy = "on-request"
approvals_reviewer = "auto_review"
hide_agent_reasoning = false
show_raw_agent_reasoning = false
commit_attribution = ""
cli_auth_credentials_store = "file"
project_doc_fallback_filenames = ["CLAUDE.md"]
web_search = "live"

sandbox_mode = "workspace-write"

[sandbox_workspace_write]
writable_roots = ["/run/user/1000/agent-browser"]
network_access = true

[tui]
status_line = [
  "model-with-reasoning",
  "current-dir",
  "git-branch",
  "context-remaining",
  "five-hour-limit",
  "weekly-limit",
]
status_line_use_colors = true
session_picker_view = "comfortable"
notifications = true
notification_condition = "unfocused"

[tui.model_availability_nux]
"gpt-5.6-sol" = 4

[features]
fast_mode = false
terminal_resize_reflow = true
memories = true
goals = true
undo = true
prevent_idle_sleep = true

[otel]
environment = "workstation"
log_user_prompt = true

[otel.exporter.otlp-grpc]
endpoint = "http://localhost:4327"

[otel.exporter.otlp-grpc.headers]

[otel.metrics_exporter.otlp-grpc]
endpoint = "http://localhost:4327"

[otel.metrics_exporter.otlp-grpc.headers]

[otel.trace_exporter.otlp-grpc]
endpoint = "http://localhost:4327"

[otel.trace_exporter.otlp-grpc.headers]

[plugins."codex-security@openai-curated"]
enabled = true

[plugins."github@openai-curated"]
enabled = true

[mcp_servers.context7]
command = "npx"
args = ["-y", "@upstash/context7-mcp"]
env_vars = ["CONTEXT7_API_KEY"]
default_tools_approval_mode = "approve"
startup_timeout_sec = 20

[desktop]
hotkey-window-projectless-default-enabled = true
worktree-keep-count = 20
conversationDetailMode = "STEPS_COMMANDS"
ambient-suggestions-enabled = true
appshotDestination = "last-chat"
selected-avatar-id = "rocky"
followUpQueueMode = "steer"
defaultTerminalLocation = "bottom"
show-context-window-usage = true
usePointerCursors = true
preventSleepWhileRunning = true
appearanceLightCodeThemeId = "catppuccin"
appearanceDarkCodeThemeId = "catppuccin"
open-link-in-target-preference = "external-browser"
open-local-url-in-target-preference = "external-browser"

model = "gpt-5.5"
model_reasoning_effort = "high"
plan_mode_reasoning_effort = "xhigh"
hide_agent_reasoning = true
show_raw_agent_reasoning = false
approvals_reviewer = "guardian_subagent"
personality = "friendly"
commit_attribution = ""
approval_policy = "on-request"
cli_auth_credentials_store = "file"
project_doc_fallback_filenames = ["CLAUDE.md"]
sandbox_mode = "workspace-write"
web_search ="live"

[tui]
status_line = ["model-with-reasoning", "current-dir", "git-branch", "context-remaining", "five-hour-limit", "weekly-limit"]
status_line_use_colors = true
theme = "two-dark"
session_picker_view = "dense"
pet = "disabled"

[tui.model_availability_nux]
"gpt-5.5" = 4

[features]
fast_mode = false
terminal_resize_reflow = true
memories = true
goals = true
undo = true

[plugins."codex-security@openai-curated"]
enabled = true

[plugins."github@openai-curated"]
enabled = true

[mcp_servers.context7]
command = "npx"
args = ["-y", "@upstash/context7-mcp"]
env_vars = ["CONTEXT7_API_KEY"]
default_tools_approval_mode = "approve"
startup_timeout_sec = 20

[projects."/home/simon/dotfiles"]
trust_level = "trusted"

[projects."/home/simon"]
trust_level = "trusted"

[projects."/home/simon/Projects/scribble"]
trust_level = "trusted"

model = "gpt-5.6-sol"
model_reasoning_effort = "low"
model_verbosity = "low"
model_reasoning_summary = "concise"
plan_mode_reasoning_effort = "high"
approval_policy = "on-request"
approvals_reviewer = "auto_review"

hide_agent_reasoning = false
show_raw_agent_reasoning = false
personality = "pragmatic"
commit_attribution = ""
cli_auth_credentials_store = "file"
project_doc_fallback_filenames = ["CLAUDE.md"]
web_search = "live"

default_permissions = "development"

[permissions.development]
description = "Main development profile"

[permissions.development.filesystem]
glob_scan_max_depth = 4
":root" = "read"
":tmpdir" = "write"
":slash_tmp" = "write"
"~/.gnupg" = "write"

[permissions.development.filesystem.":workspace_roots"]
"." = "write"
".git" = "write"
".agents" = "read"
".codex" = "read"
"**/.env" = "deny"
"**/.env.*" = "deny"
"**/*.env" = "deny"

[permissions.development.network]
enabled = true

[permissions.development.network.domains]
"localhost" = "allow"
"127.0.0.1" = "allow"
"::1" = "allow"
"**.github.com" = "allow"
"**.githubusercontent.com" = "allow"

[permissions.development.network.unix_sockets]
"/run/user/1000/agent-browser" = "allow"
"/home/simon/.gnupg/S.gpg-agent" = "allow"

[tui]
status_line = [
  "model-with-reasoning",
  "current-dir",
  "git-branch",
  "context-remaining",
  "five-hour-limit",
  "weekly-limit",
]
status_line_use_colors = true
session_picker_view = "comfortable"
notifications = true
notification_condition = "unfocused"

[tui.model_availability_nux]
"gpt-5.6-sol" = 4

[features]
fast_mode = false
terminal_resize_reflow = true
memories = true
goals = true
undo = true

[otel]
environment = "workstation"
log_user_prompt = true
exporter = { otlp-grpc = { endpoint = "http://localhost:4317", headers = {} } }
metrics_exporter = { otlp-grpc = { endpoint = "http://localhost:4317", headers = {} } }
trace_exporter = { otlp-grpc = { endpoint = "http://localhost:4317", headers = {} } }

[plugins."codex-security@openai-curated"]
enabled = true

[plugins."github@openai-curated"]
enabled = true

[mcp_servers.context7]
command = "npx"
args = ["-y", "@upstash/context7-mcp"]
env_vars = ["CONTEXT7_API_KEY"]
default_tools_approval_mode = "approve"
startup_timeout_sec = 20

[projects."/home/simon"]
trust_level = "trusted"

[projects."/home/simon/dotfiles"]
trust_level = "trusted"

[projects."/home/simon/Projects/scribble"]
trust_level = "trusted"

[projects."/home/simon/Projects/babygrad"]
trust_level = "trusted"

[projects."/home/simon/Projects/timelines"]
trust_level = "trusted"

[projects."/home/simon/Projects/kanagawa-paper.nvim"]
trust_level = "trusted"
